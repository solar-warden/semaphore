---
# Provjera verzije: agentproxy
# Read-only. Ispisuje verziju po hostu; hostove bez agentproxy preskace/oznaci.
# Default target je 'live20-app' (moze se nadjaci sa survey/extra var 'target').

- name: Provjera verzije agentproxy
  hosts: "{{ target | default('live20_app') }}"
  become: true
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Ocitaj verziju
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          v=$(dpkg-query -W -f='${db:Status-Abbrev} ${Version}\n' 'agentproxy*' 2>/dev/null | awk '$1 ~ /^ii/{print $2; exit}')
          if [ -z "$v" ] && command -v agentproxy >/dev/null 2>&1; then
            v=$(agentproxy --version 2>/dev/null || agentproxy -v 2>/dev/null)
            v=$(echo "$v" | grep -oE '[0-9]+(\.[0-9]+)+' | head -n1)
          fi
          [ -n "$v" ] && echo "VERINFO $v" || echo "VERINFO ABSENT"
      register: v
      changed_when: false
      failed_when: false

    - name: Izvuci oznacenu liniju
      ansible.builtin.set_fact:
        _verline: "{{ v.stdout_lines | select('match','^VERINFO ') | first | default('VERINFO ABSENT') }}"
      when: v is not unreachable

    - name: Zapamti verziju (samo ako je instaliran)
      ansible.builtin.set_fact:
        sw_version: "{{ _verline | regex_replace('^VERINFO ','') }}"
      when:
        - v is not unreachable
        - _verline != 'VERINFO ABSENT'

    - name: Prikazi po hostu
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: agentproxy {{ sw_version if sw_version is defined else 'nije instaliran' }}"

    - name: Sazetak — hostovi po verziji
      run_once: true
      vars:
        present: "{{ ansible_play_hosts | map('extract', hostvars) | selectattr('sw_version','defined') | list }}"
      ansible.builtin.debug:
        msg: >-
          {{ item }} ({{ present | selectattr('sw_version','equalto', item) | list | length }}):
          {{ present | selectattr('sw_version','equalto', item) | map(attribute='inventory_hostname') | join(', ') }}
      loop: "{{ ansible_play_hosts | map('extract', hostvars) | selectattr('sw_version','defined') | map(attribute='sw_version') | unique | sort | list }}"
      loop_control:
        label: "{{ item }}"
