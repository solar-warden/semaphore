---
# Popravak isteklih/nevaljanih GPG kljuceva repozitorija (EXPKEYSIG / NO_PUBKEY).
# Radi SAMO ako je repo konfiguriran na hostu; inace no-op.
#
# Rjesava DVA rasporeda kljuca:
#   * linija ima [signed-by=PATH]  -> osvjezeni kljuc ide u taj PATH
#   * linija NEMA signed-by        -> kljuc ide u namjenski keyring, a u sources
#                                     liniju se doda signed-by= (uz backup datoteke)
# Instalira kljuc tek kad je (a) fingerprint tocan I (b) kljuc NIJE istekao.
# Za svaki repo probava vise izvora dok jedan ne da valjan kljuc.

- name: Popravak GPG kljuceva repozitorija
  hosts: "{{ target | default('all') }}"
  become: true
  gather_facts: false

  vars:
    # keyring       = NAMJENSKI keyring koji se koristi ako linija nema signed-by
    # key_urls      = izvori svjezeg kljuca (probavaju se redom)
    # fingerprint   = ocekivani fingerprint
    # sources_match = niz po kojem se prepoznaje da je repo konfiguriran
    repo_keys:
      - name: mysql
        keyring: /usr/share/keyrings/mysql-community-archive-keyring.gpg
        fingerprint: BCA43417C3B485DD128EC6D4B7B3B788A8D3785C
        sources_match: "repo.mysql.com"
        key_urls:
          - "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xB7B3B788A8D3785C"
          - "https://repo.mysql.com/RPM-GPG-KEY-mysql-2025"
      - name: sury-php
        keyring: /usr/share/keyrings/deb.sury.org-php.gpg
        fingerprint: 15058500A0235D97F5D10063B188E2B695BD4743
        sources_match: "packages.sury.org"
        key_urls:
          - "https://packages.sury.org/php/apt.gpg"
          - "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xB188E2B695BD4743"

  tasks:
    - name: Obradi svaki repo
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          set -euo pipefail

          NAME="{{ item.name }}"
          DEFAULT_KEYRING="{{ item.keyring }}"
          WANT_FPR="{{ item.fingerprint | upper | replace(' ', '') }}"
          MATCH="{{ item.sources_match }}"
          URLS=(
          {% for u in item.key_urls %}
            "{{ u }}"
          {% endfor %}
          )
          SRC_PATHS=(/etc/apt/sources.list /etc/apt/sources.list.d/)
          TS="$(date +%Y%m%d%H%M%S)"

          # 1) Je li repo konfiguriran?
          if ! grep -REqs -e "$MATCH" "${SRC_PATHS[@]}" 2>/dev/null; then
            echo "SKIP: repo '$NAME' nije konfiguriran na ovom serveru — ne diram nista."
            exit 0
          fi
          command -v gpg >/dev/null 2>&1 || { echo "ERROR: gpg nije instaliran"; exit 5; }

          # 2) Otkrij kako je repo povezan s kljucem: postoji li signed-by= u liniji?
          DETECTED="$(grep -REhs -e "$MATCH" "${SRC_PATHS[@]}" 2>/dev/null \
                      | grep -vE '^[[:space:]]*#' \
                      | grep -oE 'signed-by=[^]" ]+' | head -n1 | cut -d= -f2 || true)"
          if [ -n "$DETECTED" ]; then
            TARGET="$DETECTED"; NEED_EDIT=0
            echo "  linija koristi signed-by=$TARGET"
          else
            TARGET="$DEFAULT_KEYRING"; NEED_EDIT=1
            echo "  linija NEMA signed-by -> koristim $TARGET i dodat cu signed-by"
          fi

          # 3) Dohvati i provjeri kljuc (fingerprint + da NIJE istekao)
          fetch() {
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$1" -o "$2"
            elif command -v wget >/dev/null 2>&1; then
              wget -q --no-cache -O "$2" "$1"
            else echo "ERROR: ni curl ni wget"; exit 4; fi
          }
          BASETMP="$(mktemp -d)"; trap 'rm -rf "$BASETMP"' EXIT
          GOOD=0; VALID_TO=""
          for URL in "${URLS[@]}"; do
            echo "  izvor: $URL"
            fetch "$URL" "$BASETMP/key.in" 2>/dev/null || { echo "    -> nedostupan"; continue; }
            export GNUPGHOME="$BASETMP/gpg"; rm -rf "$GNUPGHOME"; mkdir -p "$GNUPGHOME"; chmod 700 "$GNUPGHOME"
            gpg --batch --import "$BASETMP/key.in" >/dev/null 2>&1 || { echo "    -> nije GPG kljuc"; continue; }
            if ! gpg --batch --with-colons --fingerprint | awk -F: '/^fpr:/{print $10}' | grep -qiF "$WANT_FPR"; then
              echo "    -> fingerprint ne odgovara"; continue; fi
            EXP="$(gpg --batch --with-colons --list-keys "$WANT_FPR" | awk -F: '/^pub:/{print $7; exit}')"
            NOW="$(date +%s)"
            if [ -n "$EXP" ] && [ "$EXP" -le "$NOW" ]; then
              echo "    -> kljuc JOS ISTEKAO ($(date -d "@$EXP" '+%Y-%m-%d'))"; continue; fi
            gpg --batch --export "$WANT_FPR" > "$BASETMP/renewed.gpg"
            VALID_TO="$( [ -n "$EXP" ] && date -d "@$EXP" '+%Y-%m-%d' || echo 'bez isteka' )"
            GOOD=1; break
          done
          if [ "$GOOD" -ne 1 ]; then
            echo "GRESKA: nijedan izvor nije dao valjan (neistekao) kljuc za '$NAME'."
            exit 7
          fi

          # 4) Instaliraj kljuc u TARGET (sigurno prema dijeljenom keyringu)
          NKEYS=0
          if [ -f "$TARGET" ]; then
            NKEYS=$(gpg --no-default-keyring --keyring "$TARGET" --batch --with-colons --list-keys 2>/dev/null | grep -c '^pub:' || true)
          fi
          if [ "${NKEYS:-0}" -gt 1 ]; then
            # dijeljeni keyring (npr. /etc/apt/trusted.gpg) -> MERGE, nikad overwrite
            cp -a "$TARGET" "${TARGET}.bak.${TS}"
            gpg --no-default-keyring --keyring "$TARGET" --batch --import "$BASETMP/renewed.gpg" >/dev/null 2>&1
            echo "  kljuc osvjezen (merge) u dijeljenom keyringu $TARGET"
          else
            [ -f "$TARGET" ] && cp -a "$TARGET" "${TARGET}.bak.${TS}"
            mkdir -p "$(dirname "$TARGET")"
            cat "$BASETMP/renewed.gpg" > "$TARGET"
            chmod 0644 "$TARGET"
            echo "  kljuc upisan u namjenski keyring $TARGET"
          fi

          # 5) Ako linija nema signed-by, dodaj ga (samo na linije bez [opcija])
          if [ "$NEED_EDIT" -eq 1 ]; then
            for f in $(grep -REls -e "$MATCH" "${SRC_PATHS[@]}" 2>/dev/null); do
              if grep -E '^[[:space:]]*deb' "$f" | grep -F "$MATCH" | grep -qv 'signed-by='; then
                cp -a "$f" "${f}.bak.${TS}"
                sed -i -E "\#$MATCH#{ /signed-by=/! s#^([[:space:]]*deb(-src)?[[:space:]]+)(https?://)#\1[signed-by=$TARGET] \3# }" "$f"
                echo "  dodan signed-by=$TARGET u $f (backup: ${f}.bak.${TS})"
              fi
            done
            if grep -REhs -e "$MATCH" "${SRC_PATHS[@]}" 2>/dev/null | grep -E '^[[:space:]]*deb' | grep -qv 'signed-by='; then
              echo "  UPOZORENJE: ostala je linija s '$MATCH' bez signed-by (vjerojatno ima [opcije]) — uredi rucno."
            fi
          fi

          echo "OK: kljuc za '$NAME' instaliran (vrijedi do: $VALID_TO), TARGET=$TARGET"
      loop: "{{ repo_keys }}"
      loop_control:
        label: "{{ item.name }}"
      register: keyfix
      changed_when: false

    - name: Prikazi sto se dogodilo po repou
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default([]) }}"
      loop: "{{ keyfix.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Odredi koji su repoi popravljeni na ovom hostu
      ansible.builtin.set_fact:
        fixed_repos: >-
          {{ keyfix.results | selectattr('stdout', 'search', 'instaliran')
             | map(attribute='item.name') | list }}

    - name: Nema sto za popraviti
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: nijedan definirani repo nije konfiguriran ovdje — nista ucinjeno."
      when: (fixed_repos | length) == 0

    - name: Ponovni apt-get update (samo ako je nesto popravljeno)
      ansible.builtin.command:
        cmd: apt-get update
      register: apt_recheck
      changed_when: false
      failed_when: false
      environment:
        LANG: C
        LC_ALL: C
      when: (fixed_repos | length) > 0

    - name: Provjeri jesu li greske s potpisom nestale
      ansible.builtin.set_fact:
        still_broken: >-
          {{ (apt_recheck.stderr_lines + apt_recheck.stdout_lines)
             | select('search', 'EXPKEYSIG|NO_PUBKEY|signatures were invalid|is not signed')
             | list }}
      when: (fixed_repos | length) > 0

    - name: Zavrsni sazetak
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} — popravljeno: {{ fixed_repos | join(', ') }}.
          {{ 'apt update sada bez gresaka potpisa.'
             if (still_broken | length) == 0
             else 'JOS IMA problema — vidi ispod.' }}
      when: (fixed_repos | length) > 0

    - name: Preostali problemi (ako ih ima)
      ansible.builtin.debug:
        var: still_broken
      when:
        - (fixed_repos | length) > 0
        - (still_broken | length) > 0
