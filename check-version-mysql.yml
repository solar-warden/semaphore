---
# Provjera verzije: MySQL/MariaDB
# Read-only. Ispisuje verziju po hostu; hostove bez MySQL/MariaDB preskace/oznaci.
# Default target je 'mysql' (moze se nadjaci sa survey/extra var 'target').

- name: Provjera verzije MySQL/MariaDB
  hosts: "{{ target | default('mysql') }}"
  become: true
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Ocitaj verziju
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          v=""
          for b in mysqld mariadbd /usr/sbin/mysqld /usr/sbin/mariadbd; do
            if command -v "$b" >/dev/null 2>&1 || [ -x "$b" ]; then v=$("$b" --version 2>/dev/null); break; fi
          done
          if [ -n "$v" ]; then
            num=$(echo "$v" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
            if echo "$v" | grep -qi mariadb; then echo "VERINFO ${num:-unknown} (MariaDB)"; else echo "VERINFO ${num:-unknown}"; fi
          else echo "VERINFO ABSENT"; fi
      register: v
      changed_when: false
      failed_when: false

    - name: Izvuci oznacenu liniju
      ansible.builtin.set_fact:
        _verline: "{{ v.stdout_lines | select('match','^VERINFO ') | first | default('VERINFO ABSENT') }}"
      when: v is not unreachable

    - name: Zapamti verziju (samo ako je instaliran)
      ansible.builtin.set_fact:
        sw_version: "{{ _verline | regex_replace('^VERINFO ','') }}"
      when:
        - v is not unreachable
        - _verline != 'VERINFO ABSENT'

    - name: Prikazi po hostu
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: MySQL/MariaDB {{ sw_version if sw_version is defined else 'nije instaliran' }}"

    - name: Sazetak — hostovi po verziji
      run_once: true
      vars:
        present: "{{ ansible_play_hosts | map('extract', hostvars) | selectattr('sw_version','defined') | list }}"
      ansible.builtin.debug:
        msg: >-
          {{ item }} ({{ present | selectattr('sw_version','equalto', item) | list | length }}):
          {{ present | selectattr('sw_version','equalto', item) | map(attribute='inventory_hostname') | join(', ') }}
      loop: "{{ ansible_play_hosts | map('extract', hostvars) | selectattr('sw_version','defined') | map(attribute='sw_version') | unique | sort | list }}"
      loop_control:
        label: "{{ item }}"
